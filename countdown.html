<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>10 Years on Twitch Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@700&display=swap" rel="stylesheet">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Ubuntu', sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at top, rgba(120, 0, 255, 0.35), transparent 40%),
      linear-gradient(135deg, #120018 0%, #090b18 100%);
    color: white;
    position: relative;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    padding: 40px 40px 260px;
    position: relative;
    z-index: 2;
    transform: scale(0.9);
    transform-origin: top center;
  }

  .profile-pic {
    width: min(320px, 70vw);
    height: auto;
    margin-top: 70px;
    margin-bottom: 30px;
    display: block;
  }

  h1 {
    font-size: clamp(70px, 6vw, 140px);
    margin-bottom: 40px;
    line-height: 1.05;
    text-shadow:
      0 0 20px rgba(180, 100, 255, 0.8),
      0 0 40px rgba(180, 100, 255, 0.5);
  }

  .subathon-line {
    display: block;
    margin-top: 12px;
    font-size: 0.7em;
    letter-spacing: 6px;
  }

  #countdown {
    font-size: clamp(72px, 7vw, 150px);
    font-weight: 700;
    line-height: 1.1;
    text-shadow:
      0 0 30px rgba(255,255,255,0.35),
      0 0 60px rgba(140,0,255,0.4);
  }

  #finished {
    display: none;
    font-size: clamp(100px, 10vw, 220px);
    animation: pulse 1s infinite alternate;
    text-shadow:
      0 0 30px rgba(255,255,255,0.5),
      0 0 60px rgba(255,0,255,0.6);
  }

  .subtitle {
    margin-top: 28px;
    font-size: clamp(24px, 2vw, 38px);
    opacity: 0.85;
    letter-spacing: 2px;
  }

  .bottom-banner {
    position: fixed;
    left: 24px;
    right: 24px;
    bottom: 16px;
    width: calc(100vw - 48px);
    max-width: none;
    height: auto;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes pulse {
    from {
      transform: scale(1);
    }

    to {
      transform: scale(1.06);
    }
  }

  @media (max-width: 768px) {
    html,
    body {
      overflow: auto;
      min-height: 100%;
    }

    body {
      align-items: flex-start;
      justify-content: flex-start;
    }

    .container {
      height: auto;
      min-height: 100vh;
      justify-content: flex-start;
      padding: 24px 18px 180px;
      transform: none;
      transform-origin: center top;
    }

    .profile-pic {
      width: min(260px, 78vw);
      margin-top: 20px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(34px, 9vw, 56px);
      margin-bottom: 22px;
      line-height: 1.08;
    }

    .subathon-line {
      margin-top: 8px;
      font-size: 0.6em;
      letter-spacing: 3px;
    }

    #countdown {
      font-size: clamp(42px, 11vw, 72px);
      line-height: 1.05;
    }

    #finished {
      font-size: clamp(52px, 13vw, 90px);
    }

    .subtitle {
      margin-top: 18px;
      font-size: clamp(18px, 4.6vw, 28px);
      letter-spacing: 1px;
    }

    .bottom-banner {
      left: 10px;
      right: 10px;
      bottom: 10px;
      width: calc(100vw - 20px);
    }
  }
</style>
</head>

<body>

<div class="container">

  <img
    class="profile-pic"
    src="https://i.imgur.com/HiO9pDA.png"
    alt="AUSr_Krip profile picture"
  />

  <h1>
    🎉 10 YEARS ON<br>
    TWITCH 🎉
    <span class="subathon-line">SUBATHON</span>
  </h1>

  <div id="countdown">Loading...</div>

  <div id="finished">
    LET'S GO!
  </div>

  <div class="subtitle">
    JUNE 7 2026 • 10:00 PM
  </div>

</div>

<img
  class="bottom-banner"
  src="https://i.imgur.com/NvWsXgv.png"
  alt="Bottom decorative banner"
/>

<script>
  const targetDate = new Date(2026, 5, 7, 22, 0, 0);

  const countdownEl = document.getElementById("countdown");
  const finishedEl = document.getElementById("finished");

  function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      countdownEl.style.display = "none";
      finishedEl.style.display = "block";
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);

    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    countdownEl.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
