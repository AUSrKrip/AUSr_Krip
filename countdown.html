<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTA 6 OBS Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --text-3xl: clamp(2.5rem, 1rem + 4vw, 5rem);
      --font-display: 'Orbitron', 'Arial', sans-serif;
      --font-body: 'Inter', 'Helvetica Neue', sans-serif;
      --color-bg: transparent;
      --color-surface: rgba(22, 27, 58, 0.74);
      --color-surface-2: rgba(61, 36, 24, 0.86);
      --color-border: rgba(255, 201, 145, 0.26);
      --color-text: #fffaf4;
      --color-text-muted: rgba(255, 241, 228, 0.80);
      --color-text-faint: rgba(255, 224, 200, 0.60);
      --color-primary: #3ea6ff;
      --color-primary-2: #ff9b4a;
      --color-primary-highlight: rgba(62, 166, 255, 0.24);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --shadow-lg: 0 18px 60px rgba(0, 0, 0, 0.34);
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    * , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      min-height: 100vh;
      overflow: hidden;
      background: transparent;
      color: var(--color-text);
      font-family: var(--font-body, sans-serif);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      display: grid;
      place-items: end start;
      padding: 40px;
    }

    .overlay {
      position: relative;
      width: min(820px, 100%);
      border: 1px solid var(--color-border);
      border-radius: 28px;
      background:
        radial-gradient(circle at top right, rgba(62, 166, 255, 0.24), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255, 155, 74, 0.24), transparent 32%),
        linear-gradient(135deg, rgba(17, 33, 74, 0.96), rgba(86, 40, 16, 0.88));
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 26px 28px 24px;
      isolation: isolate;
    }

    .overlay::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(62, 166, 255, 0.22), rgba(255, 155, 74, 0.22));
      border: 1px solid rgba(255,216,176,0.18);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    }

    .logo svg { width: 30px; height: 30px; color: var(--color-text); }

    .eyebrow {
      font-size: var(--text-xs);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--color-text-faint);
      margin-bottom: 4px;
    }

    .title {
      font-family: var(--font-display, sans-serif);
      font-size: clamp(1.4rem, 1rem + 1.8vw, 2.5rem);
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-shadow: 0 0 22px rgba(62, 166, 255, 0.26);
    }

    .status {
      display: none;
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: none;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      white-space: nowrap;
    }
    .launched .status {
      display: inline-flex;
      padding: 10px 14px;
      border-radius: var(--radius-full);
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,216,176,0.18);
    }

    .count-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .unit {
      position: relative;
      border-radius: 22px;
      padding: 18px 16px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,216,176,0.14);
      min-height: 126px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .unit::after {
      content: "";
      position: absolute;
      inset: auto -20% -45% auto;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(99, 225, 255, 0.1), transparent 60%);
      pointer-events: none;
    }

    .value {
      font-family: var(--font-display, sans-serif);
      font-size: clamp(2rem, 1.2rem + 2.8vw, 4rem);
      line-height: 0.95;
      letter-spacing: 0.03em;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }

    .label {
      margin-top: 8px;
      font-size: var(--text-xs);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-text-faint);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }

    .release {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .release-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--color-primary), var(--color-primary-2));
      box-shadow: 0 0 18px rgba(62, 166, 255, 0.48);
      flex: 0 0 auto;
    }

    .hint {
      color: var(--color-text-faint);
      text-align: right;
      font-size: var(--text-xs);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .launched .status,
    .launched .release-dot {
      background: linear-gradient(180deg, #3ea6ff, #ff9b4a);
      box-shadow: 0 0 18px rgba(62, 166, 255, 0.48);
    }

    .launched .title {
      text-shadow: 0 0 22px rgba(109, 170, 69, 0.25);
    }

    @media (max-width: 820px) {
      body { padding: 18px; }
      .overlay { border-radius: 22px; padding: 18px; }
      .header, .footer { flex-direction: column; align-items: flex-start; }
      .status, .hint { white-space: normal; text-align: left; }
      .count-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .unit { min-height: 110px; }
    }

    @media (max-width: 460px) {
      .count-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .logo { width: 48px; height: 48px; border-radius: 14px; }
      .unit { padding: 14px; border-radius: 18px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="overlay" id="overlayRoot" aria-label="GTA 6 countdown overlay">
    <section class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <img
            src="https://onlybeards.vip/Stream-Images/imagesgta6.jpg"
            alt="GTA 6 cover art"
            style="width: 100%; height: 100%; object-fit: cover; border-radius: 16px;"
          />
        </div>
        <div>
          
          <h1 class="title">GTA VI Countdown</h1>
        </div>
      </div>
      <div class="status" id="statusText">Waiting for release</div>
    </section>

    <section class="count-grid" aria-label="Time remaining">
      <article class="unit"><div class="value" id="days">000</div><div class="label">Days</div></article>
      <article class="unit"><div class="value" id="hours">00</div><div class="label">Hours</div></article>
      <article class="unit"><div class="value" id="minutes">00</div><div class="label">Minutes</div></article>
      <article class="unit"><div class="value" id="seconds">00</div><div class="label">Seconds</div></article>
    </section>

    <section class="footer">
      <div class="release">
        <span class="release-dot" aria-hidden="true"></span>
        <span id="releaseText">Target: 19 Nov 2026, 12:00 AM</span>
      </div>
      
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const targetParam = params.get('target');
    const titleParam = params.get('title');
    const labelParam = params.get('label');
    const timezoneParam = params.get('tz');

    const targetDate = targetParam ? new Date(targetParam) : new Date('2026-11-19T00:00:00+10:00');
    const titleEl = document.querySelector('.title');
    const statusEl = document.getElementById('statusText');
    const releaseEl = document.getElementById('releaseText');
    const overlayRoot = document.getElementById('overlayRoot');
    const units = {
      days: document.getElementById('days'),
      hours: document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds')
    };

    if (titleParam) titleEl.textContent = titleParam;

    function pad(value, len = 2) {
      return String(value).padStart(len, '0');
    }

    function formatRelease(date) {
      const opts = {
        day: 'numeric',
        month: 'short',
        year: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        timeZoneName: 'short'
      };
      if (timezoneParam) opts.timeZone = timezoneParam;
      return new Intl.DateTimeFormat(undefined, opts).format(date);
    }

    releaseEl.textContent = (labelParam ? labelParam + ': ' : 'Target: ') + formatRelease(targetDate);

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate.getTime() - now.getTime();

      if (diff <= 0) {
        overlayRoot.classList.add('launched');
        units.days.textContent = '000';
        units.hours.textContent = '00';
        units.minutes.textContent = '00';
        units.seconds.textContent = '00';
        statusEl.textContent = 'Now live';
        return;
      }

      overlayRoot.classList.remove('launched');
      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      units.days.textContent = pad(days, 3);
      units.hours.textContent = pad(hours);
      units.minutes.textContent = pad(minutes);
      units.seconds.textContent = pad(seconds);
      statusEl.textContent = '';
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
