<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>10 Years on Twitch Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@700&display=swap" rel="stylesheet">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Ubuntu', sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;

    background:
      radial-gradient(circle at top, rgba(120, 0, 255, 0.35), transparent 40%),
      linear-gradient(135deg, #120018 0%, #090b18 100%);

    color: white;
  }

  .container {
    width: 100%;
    height: 100%;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    text-align: center;
    padding: 40px;
  }

  h1 {
    font-size: clamp(70px, 6vw, 140px);
    margin-bottom: 40px;

    text-shadow:
      0 0 20px rgba(180, 100, 255, 0.8),
      0 0 40px rgba(180, 100, 255, 0.5);
  }

  #countdown {
    font-size: clamp(90px, 8vw, 180px);
    font-weight: 700;
    line-height: 1.1;

    text-shadow:
      0 0 30px rgba(255,255,255,0.35),
      0 0 60px rgba(140,0,255,0.4);
  }

  #finished {
    display: none;

    font-size: clamp(100px, 10vw, 220px);

    animation: pulse 1s infinite alternate;

    text-shadow:
      0 0 30px rgba(255,255,255,0.5),
      0 0 60px rgba(255,0,255,0.6);
  }

  .subtitle {
    margin-top: 45px;

    font-size: clamp(28px, 2vw, 42px);

    opacity: 0.85;

    letter-spacing: 2px;
  }

  @keyframes pulse {
    from {
      transform: scale(1);
    }

    to {
      transform: scale(1.06);
    }
  }
</style>
</head>

<body>

<div class="container">

  <h1>🎉 10 YEARS ON TWITCH 🎉</h1>

  <div id="countdown">Loading...</div>

  <div id="finished">
    LET'S GO!
  </div>

  <div class="subtitle">
    JUNE 7 2026 • 10:00 PM
  </div>

</div>

<script>
  const targetDate = new Date(2026, 5, 7, 22, 0, 0);

  const countdownEl = document.getElementById("countdown");
  const finishedEl = document.getElementById("finished");

  function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      countdownEl.style.display = "none";
      finishedEl.style.display = "block";
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);

    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    countdownEl.innerHTML =
      `${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
